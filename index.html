<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>랜덤 팀 배정기 MVP</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <section class="panel controls">
      <div class="field">
        <label for="memberFile">구성원 txt 파일 (이름을 줄단위로 적어주세요)</label>
        <input id="memberFile" type="file" accept=".txt,text/plain" />
      </div>

      <div class="field">
        <label for="teamSize">팀당 인원</label>
        <input id="teamSize" type="number" min="1" value="3" />
      </div>

      <div class="button-group">
        <button id="makeBtn" type="button">팀 생성</button>
      </div>
    </section>

    <section id="captureArea" class="board-wrap" hidden>
      <div class="board-title">
        <div class="title-group">
          <h1>팀 결과</h1>
          <p id="summary"></p>
        </div>
        <div class="button-group">
          <button id="shuffleBtn" type="button" class="secondary">인원 섞기</button>
          <button id="copyImageBtn" type="button" class="secondary">이미지 복사</button>
        </div>
      </div>
      <div class="panel summary-panel">
        <p id="hint" class="hint"></p>
      </div>

      <div id="teamBoard" class="team-board"></div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
