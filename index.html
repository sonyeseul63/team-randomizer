<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팀 짜줍니다 - 랜덤 팀 배정기</title>
  <meta name="description" content="구성원 파일을 업로드하면 랜덤으로 팀을 배정해드려요. 드래그로 팀원 조정, 인원수 변경, 다시 섞기까지 간편하게." />
  <meta name="keywords" content="팀 짜기, 랜덤 팀 배정, 팀 나누기, 팀 배정기, 랜덤 팀 만들기, 팀 생성기" />
  <meta property="og:title" content="팀 짜줍니다 - 랜덤 팀 배정기" />
  <meta property="og:description" content="구성원 파일을 업로드하면 랜덤으로 팀을 배정해드려요." />
  <meta property="og:type" content="website" />
  <meta name="robots" content="index, follow" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎲</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-text">팀 짜줍니다</span>
      </div>
    </div>
  </header>

  <main class="app">
    <div class="app-body">
    <section class="panel controls">
      <div class="hero-icon">🎲</div>
      <div class="input-tabs" id="inputModeControl">
        <button type="button" class="input-tab active" data-tab="file">파일 업로드</button>
        <button type="button" class="input-tab" data-tab="text">직접 입력</button>
      </div>

      <div class="tab-panel" id="tabFile">
        <div class="file-upload-wrapper">
          <div class="file-upload-display">
            <span id="fileUploadText" class="file-upload-text">클릭해서 .txt 파일 선택</span>
          </div>
          <input id="memberFile" type="file" accept=".txt,text/plain" />
        </div>
      </div>
      <div class="tab-panel" id="tabText" hidden>
        <textarea id="memberText" placeholder="김민지&#10;이서연&#10;박지훈&#10;최유진"></textarea>
      </div>

      <div class="controls-bottom">
        <select id="teamMode" class="mode-select">
          <option value="perTeam">팀당 인원</option>
          <option value="numTeams">팀 개수</option>
        </select>
        <input id="teamSize" type="number" min="1" value="3" />
        <button id="makeBtn" type="button">팀 생성하기</button>
      </div>
    </section>

    <section id="captureArea" class="board-wrap">
      <div class="board-title">
        <div class="title-group">
          <h2>팀 결과</h2>
          <span class="summary-badge" id="summary"></span>
        </div>
        <div class="button-group" id="resultBtns">
          <button id="shuffleBtn" type="button" class="secondary">다시 섞기</button>
          <button id="copyImageBtn" type="button" class="secondary">이미지 복사</button>
        </div>
      </div>
      <p id="hint" class="hint"></p>

      <div id="teamBoard" class="team-board">
        <div class="empty-state">
          <pre class="ascii-art">  _______
 /       \
|  o   o  |
|    ^    |
|   ___   |
 \_______/

    /| |\
   / | | \
    /   \</pre>
          두근두근 . .
</div>
      </div>
    </section>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
