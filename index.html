<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팀 짜줍니다</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎲</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-text">팀 짜줍니다</span>
      </div>
    </div>
  </header>

  <main class="app">
    <div class="hero">
      <div class="hero-icon">🎲</div>
    </div>

    <section class="panel controls">
      <div class="field">
        <label class="field-label" for="memberFile">구성원 파일 <span class="field-label-hint">이름을 줄 단위로 작성한 .txt 파일</span></label>
        <div class="file-upload-wrapper">
          <div class="file-upload-display">
<span id="fileUploadText" class="file-upload-text">클릭해서 .txt 파일 선택</span>
          </div>
          <input id="memberFile" type="file" accept=".txt,text/plain" />
        </div>
      </div>

      <div class="field">
        <select id="teamMode" class="mode-select">
          <option value="perTeam">팀당 인원</option>
          <option value="numTeams">팀 개수</option>
        </select>
        <input id="teamSize" type="number" min="1" value="3" />
      </div>

      <div class="button-group controls-btn">
        <button id="makeBtn" type="button">팀 생성하기</button>
      </div>
    </section>

    <section id="captureArea" class="board-wrap">
      <div class="board-title">
        <div class="title-group">
          <h2>팀 결과</h2>
          <span class="summary-badge" id="summary"></span>
        </div>
        <div class="button-group" id="resultBtns">
          <button id="shuffleBtn" type="button" class="secondary">다시 섞기</button>
          <button id="copyImageBtn" type="button" class="secondary">이미지 복사</button>
        </div>
      </div>
      <p id="hint" class="hint"></p>

      <div id="teamBoard" class="team-board">
        <div class="empty-state">
          <pre class="ascii-art">  _______
 /       \
|  o   o  |
|    ^    |
|   ___   |
 \_______/

    /| |\
   / | | \
    /   \</pre>
          두근두근 . .
</div>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
